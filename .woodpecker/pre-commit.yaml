# SPDX-PackageName: finnix-docs
# SPDX-PackageSupplier: Ryan Finnie <ryan@finnie.org>
# SPDX-PackageDownloadLocation: https://codeberg.org/finnix/finnix-docs
# SPDX-FileComment: Woodpecker CI pre-commit workflow
# SPDX-FileCopyrightText: © 2026 Ryan Finnie <ryan@finnie.org>
# SPDX-License-Identifier: MPL-2.0
---
when:
  - event: ["push", "pull_request", "manual"]
labels:
  platform: "linux/amd64"
steps:
  - name: "pre-commit"
    image: "python:3.14-trixie"
    commands: |
      set -x

      mkdir -p /etc/apt/apt.conf.d
      cat <<"EOM" >/etc/apt/apt.conf.d/99proxy
      Acquire::http::Proxy "http://deb-proxy.snowman.lan:8000";
      Acquire::https::Proxy "http://deb-proxy.snowman.lan:8000";
      EOM
      mkdir -p ~/.pip
      cat <<"EOM" >~/.pip/pip.conf
      [global]
      index-url = http://omniproxi.snowman.lan/pypi/simple/
      trusted-host = omniproxi.snowman.lan
      EOM

      apt update
      apt -y install shellcheck shfmt curl

      mkdir -p ~/.cache/pre-commit
      cache_url="http://artifacts.snowman.lan/cache_pre-commit_$${CI_REPO_OWNER}_$${CI_REPO_NAME}_$(uname -m).tar.gz"
      curl --fail-with-body -H "Authorization: Basic $${ASSETS_AUTH}" "$${cache_url}" | tar -C ~/.cache/pre-commit -zxf - || true
      python -m pip install pre-commit
      pre-commit run --show-diff-on-failure --color=always --all-files
      pre-commit gc
      tar -C ~/.cache/pre-commit -zcf - . | curl --fail-with-body -T - -H "Authorization: Basic $${ASSETS_AUTH}" "$${cache_url}"
    environment:
      ASSETS_AUTH:
        from_secret: "ASSETS_AUTH"
  - name: "Notify Mastodon if failure"
    when:
      - status: ["failure"]
    image: "woodpeckerci/plugin-mastodon-post"
    settings:
      server_url: "https://m29.us"
      access_token:
        from_secret: "m29_token"
      status: |
        🪿 🪿 🪿 FAILURE: {{ CI_REPO }} 🪿 🪿 🪿
        Workflow: {{ CI_WORKFLOW_NAME }} ({{ CI_PIPELINE_EVENT }} on {{ CI_COMMIT_REF }})

        Pipeline: {{ CI_PIPELINE_URL }}
        Commit: {{ CI_PIPELINE_FORGE_URL }}
